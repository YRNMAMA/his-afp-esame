<div class="flex flex-wrap items-center gap-3 p-2">
  <p-button
    (onClick)="PatientManager.fetchPazienti()"
    [rounded]="true"
    [text]="true"
    icon="pi pi-refresh"
    severity="secondary"
    label="Aggiorna"
  />
  <p-button
    (onClick)="PatientManager.stopRefreshPazienti()"
    [rounded]="true"
    [text]="true"
    icon="pi pi-stop"
    severity="warn"
    label="Ferma refresh"
  />
  <div class="flex items-center gap-2">
    <label class="text-sm" for="refreshToggle">Refresh automatico</label>
    <p-toggle-switch id="refreshToggle" [(ngModel)]="enableRefreshPz" />
  </div>
  <input
    [(ngModel)]="nomePaziente"
    pInputText
    placeholder="Cerca per nome e cognome"
    type="text"
  />
</div>

<p class="px-2 text-sm text-gray-600">Pazienti presenti in PS: {{ PatientManager.listaPZ().length }}</p>

<div class="flex flex-wrap flex-row gap-4 p-4">
  @for (paziente of PatientManager.listaPZ(); track paziente.braccialetto) {
    <his-card-pz [borderTop]="false" [paziente]="paziente"/>
  } @empty {
    <h1>Nessun paziente in attesa</h1>
  }
</div>
