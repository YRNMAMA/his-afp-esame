# AMBIENTE PROD
server{
    listen 80;
    server_name localhost;
    location / {
        proxy_pass http://fe-prod:80;
    }
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:3000;
    }
}

